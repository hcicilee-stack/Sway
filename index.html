<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Sway</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020408" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/hcicilee-stack/FlowSpace/main/logo.png" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('Sway Service Worker Registered!', reg.scope);
              reg.update();
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    /* 2. 移除暴力的 window.location.reload()。
                       新代码下载好后会在后台静默待命，用户下次打开或正常切后台时自然生效。
                       彻底根除“黑屏几秒、闪烁、UI丢失”的冷启动惨剧。
                    */
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      console.log('New version downloaded silently, will apply on next launch.');
                    }
                  };
                }
              };
            })
            .catch(err => console.log('Sway Service Worker Registration Failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
