<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sway</title>
    <!-- PWA Settings -->
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta name="theme-color" content="#020408" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/hcicilee-stack/FlowSpace/main/logo.png" />
    <script type="module">
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const swUrl = new URL('sw.js', new URL(import.meta.env.BASE_URL, window.location.href));
          navigator.serviceWorker.register(swUrl.href)
            .then(reg => {
              console.log('Sway Service Worker Registered!', reg.scope);
              reg.update();
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      console.log('New content available; forcing immediate reload...');
                      window.location.reload();
                    }
                  };
                }
              };
            })
            .catch(err => console.log('Sway Service Worker Registration Failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
